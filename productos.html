    <main>
        <section class="productos-page-section">
            <div class="productos-page-header">
                <h1>Todos los Productos</h1>
                <p id="productosCount" class="productos-count"></p>
            </div>

            <div class="productos-filtros">
                <div class="filtro-search">
                    <input type="search" id="filtroTexto" placeholder="Buscar por nombre, marca o descripción...">
                    <button onclick="aplicarFiltros()">Buscar</button>
                </div>
                <div class="filtro-selects">
                    <select id="filtroMarca" onchange="aplicarFiltros()">
                        <option value="">Todas las marcas</option>
                        <option value="Apple">Apple</option>
                        <option value="Samsung">Samsung</option>
                        <option value="Google">Google</option>
                        <option value="Motorola">Motorola</option>
                        <option value="Xiaomi">Xiaomi</option>
                        <option value="OnePlus">OnePlus</option>
                        <option value="Huawei">Huawei</option>
                        <option value="Realme">Realme</option>
                        <option value="Nothing">Nothing</option>
                        <option value="Sony">Sony</option>
                        <option value="ASUS">ASUS</option>
                    </select>
                    <select id="filtroOferta" onchange="aplicarFiltros()">
                        <option value="">Todos los productos</option>
                        <option value="true">Solo ofertas</option>
                    </select>
                    <select id="filtroOrden" onchange="aplicarFiltros()">
                        <option value="">Ordenar por</option>
                        <option value="precio-asc">Precio: menor a mayor</option>
                        <option value="precio-desc">Precio: mayor a menor</option>
                        <option value="nombre-asc">Nombre: A-Z</option>
                    </select>
                </div>
                <button class="btn-limpiar-filtros" onclick="limpiarFiltros()">✕ Limpiar filtros</button>
            </div>

            <div class="productos-grid" id="productosGrid">
                <p>Cargando productos...</p>
            </div>
        </section>
    </main>
